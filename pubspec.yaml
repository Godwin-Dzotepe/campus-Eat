name: campus_eat
description: "Campus food ordering app for students."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Local DB / Storage
  hive_flutter: ^1.1.0

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Animations
  lottie: ^3.1.0

  # Theme
  # flex_color_scheme removed — using Material 3 ColorScheme.fromSeed instead

  # Icons / SVG
  flutter_svg: ^2.0.10+1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  supabase_flutter: ^2.8.0

  # Utilities
  google_fonts: ^6.2.1
  uuid: ^4.4.0
  intl: ^0.19.0
  equatable: ^2.0.5
  path_provider: ^2.1.3
  shared_preferences: ^2.3.2
  permission_handler: ^11.3.1
  crypto: ^3.0.3
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - assets/svg/
    - assets/onboarding/
  # fonts:  # Uncomment after adding Poppins TTF files to assets/fonts/
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Poppins-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700
